services:
  db:
    image: postgres:16
    container_name: yakudoc_db
    environment:
      POSTGRES_DB: yakudoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - yakudoc_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  yakudoc_db_data:
